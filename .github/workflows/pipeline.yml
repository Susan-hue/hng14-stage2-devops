name: CI/CD Pipeline

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
# ─────────────────────────────────────────────
# STAGE 1 — LINT
# Checks code style without running anything.
# flake8 = Python linter
# eslint = JavaScript linter
# hadolint = Dockerfile linter
# ─────────────────────────────────────────────
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install flake8
        run: pip install flake8

      - name: Lint Python — api
        run: flake8 api/ --max-line-length=88

      - name: Lint Python — worker
        run: flake8 worker/ --max-line-length=88

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Lint JavaScript — frontend
        working-directory: frontend
        run: npx eslint app.js

      - name: Install hadolint
        run: |
          wget -qO /usr/local/bin/hadolint \
            https://github.com/hadolint/hadolint/releases/latest/download/hadolint-Linux-x86_64
          chmod +x /usr/local/bin/hadolint

      - name: Lint Dockerfiles
        run: |
          hadolint api/Dockerfile
          hadolint worker/Dockerfile
          hadolint frontend/Dockerfile

# ─────────────────────────────────────────────
# STAGE 2 — TEST
# Runs pytest unit tests against the API.
# Redis is mocked — no real Redis needed.
# Generates a coverage report and uploads it
# as a downloadable artifact in GitHub Actions.
# ─────────────────────────────────────────────
  test:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install test dependencies
        run: pip install -r api/requirements-test.txt -r api/requirements.txt

      - name: Run tests with coverage
        working-directory: api
        run: pytest --cov=. --cov-report=xml --cov-report=html

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: api/htmlcov/

# ─────────────────────────────────────────────
# STAGE 3 — BUILD
# Builds all three Docker images.
# Pushes them to a temporary local registry
# running as a service container on localhost:5000.
# Tags each image with the git SHA and latest.
# ─────────────────────────────────────────────
  build:
    runs-on: ubuntu-latest
    needs: test
    services:
      registry:
        image: registry:2
        ports:
          - 5000:5000

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver-opts: network=host

      - name: Build and push API image
        uses: docker/build-push-action@v5
        with:
          context: ./api
          push: true
          tags: |
            localhost:5000/api:${{ github.sha }}
            localhost:5000/api:latest

      - name: Build and push worker image
        uses: docker/build-push-action@v5
        with:
          context: ./worker
          push: true
          tags: |
            localhost:5000/worker:${{ github.sha }}
            localhost:5000/worker:latest

      - name: Build and push frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: |
            localhost:5000/frontend:${{ github.sha }}
            localhost:5000/frontend:latest

# ─────────────────────────────────────────────
# STAGE 4 — SECURITY SCAN
# Trivy scans each image for known vulnerabilities.
# Pipeline FAILS if any CRITICAL finding is found.
# Results are uploaded as a SARIF artifact.
# ─────────────────────────────────────────────
  security-scan:
    runs-on: ubuntu-latest
    needs: build
    services:
      registry:
        image: registry:2
        ports:
          - 5000:5000

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver-opts: network=host

      - name: Rebuild images for scanning
        run: |
          docker buildx build --load -t localhost:5000/api:latest ./api
          docker buildx build --load -t localhost:5000/worker:latest ./worker
          docker buildx build --load -t localhost:5000/frontend:latest ./frontend

      - name: Install Trivy
        run: |
          wget -qO- https://aquasecurity.github.io/trivy-repo/deb/public.key | \
            sudo apt-key add -
          echo "deb https://aquasecurity.github.io/trivy-repo/deb generic main" | \
            sudo tee /etc/apt/sources.list.d/trivy.list
          sudo apt-get update && sudo apt-get install -y trivy

      - name: Scan API image
        run: |
          trivy image --exit-code 1 --severity CRITICAL \
            --format sarif --output trivy-api.sarif \
            localhost:5000/api:latest

      - name: Scan worker image
        run: |
          trivy image --exit-code 1 --severity CRITICAL \
            --format sarif --output trivy-worker.sarif \
            localhost:5000/worker:latest

      - name: Scan frontend image
        run: |
          trivy image --exit-code 0 --severity CRITICAL \
            --format table \
            localhost:5000/frontend:latest
          trivy image --exit-code 1 --severity CRITICAL \
            --format sarif --output trivy-frontend.sarif \
            localhost:5000/frontend:latest


      - name: Upload SARIF results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: trivy-results
          path: "*.sarif"

     
# ─────────────────────────────────────────────
# STAGE 5 — INTEGRATION TEST
# Spins up the full stack inside the GitHub runner.
# Submits a real job through the frontend.
# Polls until the worker marks it complete.
# Tears down cleanly whether it passed or failed.
# ─────────────────────────────────────────────
  integration-test:
    runs-on: ubuntu-latest
    needs: security-scan

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create .env for compose
        run: |
          cat > .env <<EOF
          REDIS_HOST=${{ secrets.REDIS_HOST }}
          REDIS_PORT=${{ secrets.REDIS_PORT }}
          REDIS_PASSWORD=${{ secrets.REDIS_PASSWORD }}
          API_HOST=${{ secrets.API_HOST }}
          API_PORT=${{ secrets.API_PORT }}
          API_URL=${{ secrets.API_URL }}
          PORT=${{ secrets.PORT }}
          EOF

      - name: Start full stack
        run: docker compose up --build -d

      - name: Wait for stack to be healthy
        run: |
          echo "Waiting for services to be healthy..."
          sleep 20

      - name: Submit a job and poll for completion
        run: |
          RESPONSE=$(curl -s -X POST http://localhost:3000/submit \
            -H "Content-Type: application/json")
          echo "Submit response: $RESPONSE"

          JOB_ID=$(echo $RESPONSE | python3 -c \
            "import sys,json; print(json.load(sys.stdin)['job_id'])")
          echo "Job ID: $JOB_ID"

          for i in $(seq 1 20); do
            STATUS=$(curl -s http://localhost:3000/status/$JOB_ID | \
              python3 -c "import sys,json; print(json.load(sys.stdin)['status'])")
            echo "Attempt $i — status: $STATUS"
            if [ "$STATUS" = "completed" ]; then
              echo "Job completed successfully"
              exit 0
            fi
            sleep 3
          done

          echo "Job did not complete within 60 seconds"
          exit 1

      - name: Tear down stack
        if: always()
        run: docker compose down -v

# ─────────────────────────────────────────────
# STAGE 6 — DEPLOY
# Only runs on pushes to main.
# SSHes into your server and performs a rolling
# update — new container must be healthy before
# old one is stopped.
# ─────────────────────────────────────────────
  deploy:
    runs-on: ubuntu-latest
    needs: integration-test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to server via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            export PATH=$PATH:/usr/bin:/usr/local/bin

            # Clone repo if it doesn't exist, otherwise pull latest
            if [ ! -d ~/app/.git ]; then
              git clone https://github.com/${{ github.repository }} ~/app
            else
              cd ~/app && git pull origin main
            fi

            cd ~/app

            # Write .env file from secrets
            cat > .env <<EOF
            REDIS_HOST=${{ secrets.REDIS_HOST }}
            REDIS_PORT=${{ secrets.REDIS_PORT }}
            REDIS_PASSWORD=${{ secrets.REDIS_PASSWORD }}
            API_HOST=${{ secrets.API_HOST }}
            API_PORT=${{ secrets.API_PORT }}
            API_URL=${{ secrets.API_URL }}
            PORT=${{ secrets.PORT }}
            EOF

            # Start new container
            /usr/bin/docker-compose up -d --build --no-deps api

            # Wait for health check
            TIMEOUT=60
            ELAPSED=0

            while [ $ELAPSED -lt $TIMEOUT ]; do
              NEW_CONTAINER=$(/usr/bin/docker ps --filter "name=app-api" --format "{{.ID}}" | head -1)
              if [ -n "$NEW_CONTAINER" ]; then
                HEALTH=$(/usr/bin/docker inspect --format='{{.State.Health.Status}}' $NEW_CONTAINER)
                echo "Health: $HEALTH (${ELAPSED}s elapsed)"
                if [ "$HEALTH" = "healthy" ]; then
                  echo "Container is healthy — deploy successful"
                  /usr/bin/docker-compose up -d --build
                  exit 0
                fi
              fi
              sleep 5
              ELAPSED=$((ELAPSED + 5))
            done

            echo "Container did not become healthy — aborting"
            /usr/bin/docker-compose down
            exit 1